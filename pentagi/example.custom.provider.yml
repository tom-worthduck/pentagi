# HardenAGI Provider Configuration for LM Studio
# Two-model setup:
#   - openai/gpt-oss-120b: reasoning roles (primary, generator, refiner, adviser, reflector)
#   - qwen2.5-32b-instruct: execution roles (pentester, coder, installer, searcher, enricher)
# LM Studio will swap models on demand. Reasoning tasks get the 120B model
# for better planning and tool call accuracy.

simple:
  model: "qwen2.5-32b-instruct"
  temperature: 0.7
  top_p: 0.8
  n: 1
  max_tokens: 4000
  price:
    input: 0
    output: 0

simple_json:
  model: "qwen2.5-32b-instruct"
  temperature: 0.7
  top_p: 0.8
  n: 1
  max_tokens: 4000
  json: true
  price:
    input: 0
    output: 0

