# HardenAGI Provider Configuration for LM Studio
# Single proven model (qwen2.5-32b-instruct) for all roles
# This model passed ctester tool call validation
# Temperature tuned per agent role per PentAGI reference config
#
# Why single model: LM Studio loads one model at a time.
# Multi-model configs cause constant unload/reload cycles.
# qwen2.5-32b-instruct handles tool calls reliably.

simple:
  model: "qwen2.5-32b-instruct"
  temperature: 0.7
  top_p: 0.8
  n: 1
  max_tokens: 4000
  price:
    input: 0
    output: 0

